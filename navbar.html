<script src="/js/calculator-index.js"></script>

<script>
const btn = document.getElementById("menuBtn");
const menu = document.getElementById("mobileMenu");
const desktopInput = document.getElementById("calculatorSearch");
const desktopResults = document.getElementById("searchResults");
const mobileInput = document.getElementById("mobileCalculatorSearch");
const mobileResults = document.getElementById("mobileSearchResults");

if (btn && menu) {
  btn.addEventListener("click", () => {
    menu.classList.toggle("hidden");
  });
}

window.calculatorIndex = window.calculatorIndex || [];

function normalizeText(value) {
  return (value || "").toLowerCase().trim();
}

function renderResults(inputEl, resultsEl) {
  if (!inputEl || !resultsEl) return;

  const query = normalizeText(inputEl.value);
  resultsEl.innerHTML = "";

  if (!query) {
    resultsEl.classList.add("hidden");
    return;
  }

  const list = Array.isArray(window.calculatorIndex) ? window.calculatorIndex : [];
  const matches = list.filter((calc) => {
    const name = normalizeText(calc.name);
    const keywords = normalizeText(calc.keywords);
    const url = normalizeText(calc.url);
    return name.includes(query) || keywords.includes(query) || url.includes(query);
  }).slice(0, 8);

  if (matches.length === 0) {
    const empty = document.createElement("div");
    empty.className = "px-4 py-3 text-sm text-slate-500";
    empty.textContent = "No matching calculators found";
    resultsEl.appendChild(empty);
    resultsEl.classList.remove("hidden");
    return;
  }

  matches.forEach((calc) => {
    const item = document.createElement("a");
    item.href = calc.url;
    item.className = "block px-4 py-2 hover:bg-blue-50 text-sm border-b border-slate-100 last:border-b-0";
    item.textContent = calc.name;
    resultsEl.appendChild(item);
  });

  resultsEl.classList.remove("hidden");
}

if (desktopInput && desktopResults) {
  desktopInput.addEventListener("input", () => renderResults(desktopInput, desktopResults));
  desktopInput.addEventListener("focus", () => renderResults(desktopInput, desktopResults));
}

if (mobileInput && mobileResults) {
  mobileInput.addEventListener("input", () => renderResults(mobileInput, mobileResults));
  mobileInput.addEventListener("focus", () => renderResults(mobileInput, mobileResults));
}

document.addEventListener("click", (e) => {
  if (desktopInput && desktopResults && !desktopInput.contains(e.target) && !desktopResults.contains(e.target)) {
    desktopResults.classList.add("hidden");
  }
  if (mobileInput && mobileResults && !mobileInput.contains(e.target) && !mobileResults.contains(e.target)) {
    mobileResults.classList.add("hidden");
  }
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    if (desktopResults) desktopResults.classList.add("hidden");
    if (mobileResults) mobileResults.classList.add("hidden");
  }
});

if (typeof window.loadCalculatorIndex === "function") {
  window.loadCalculatorIndex()
    .then((data) => {
      if (Array.isArray(data)) {
        window.calculatorIndex = data;
      }
      console.log("Loaded calculators:", window.calculatorIndex.length);
    })
    .catch((error) => {
      console.error("Calculator index load failed:", error);
    });
}
</script>
