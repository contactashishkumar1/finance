<!-- Calculator Index -->
<script src="/js/calculator-index.js"></script>

<script>

let calculatorIndex=[];

const btn = document.getElementById("menuBtn");
const menu = document.getElementById("mobileMenu");

btn.addEventListener("click", () => {
menu.classList.toggle("hidden");
});

/* LOAD CALCULATORS */

window.loadCalculatorIndex().then((data)=>{

calculatorIndex=data;

console.log("Loaded calculators:",calculatorIndex.length);

});

/* SEARCH */

function searchCalculator(inputId,resultId){

let input=document.getElementById(inputId);

let results=document.getElementById(resultId);

let value=input.value.toLowerCase();

results.innerHTML="";

if(value.length<1){

results.classList.add("hidden");

return;

}

if(!calculatorIndex || calculatorIndex.length===0){
return;
}

let matches=calculatorIndex.filter(calc=>

calc.name.toLowerCase().includes(value) ||

calc.keywords.toLowerCase().includes(value)

);

matches.slice(0,8).forEach(calc=>{

let item=document.createElement("a");

item.href=calc.url;

item.className="block px-4 py-2 hover:bg-blue-50 text-sm";

item.textContent=calc.name;

results.appendChild(item);

});

results.classList.remove("hidden");

}

/* DESKTOP */

document
.getElementById("calculatorSearch")
.addEventListener("keyup",function(){

searchCalculator(
"calculatorSearch",
"searchResults"
);

});

/* MOBILE */

document
.getElementById("mobileCalculatorSearch")
.addEventListener("keyup",function(){

searchCalculator(
"mobileCalculatorSearch",
"mobileSearchResults"
);

});

</script>
