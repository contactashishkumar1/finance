<script src="/js/calculator-index.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

const btn=document.getElementById("menuBtn");
const menu=document.getElementById("mobileMenu");

if(btn){
btn.addEventListener("click",()=>{
menu.classList.toggle("hidden");
});
}

function searchCalculator(inputId,resultId){

let input=document.getElementById(inputId);
let results=document.getElementById(resultId);

if(!input || !results) return;

let value=input.value.toLowerCase();

results.innerHTML="";

if(value===""){
results.classList.add("hidden");
return;
}

/* SAFE CHECK */
if(typeof window.calculators === "undefined"){
console.log("Calculator index not loaded yet");
return;
}

let matches=window.calculators.filter(calc=>

calc.name.toLowerCase().includes(value) ||
calc.keywords.toLowerCase().includes(value)

);

if(matches.length===0){
results.classList.add("hidden");
return;
}

matches.slice(0,8).forEach(calc=>{

let item=document.createElement("a");

item.href=calc.url;

item.className="block px-4 py-2 hover:bg-blue-50 text-sm";

item.textContent=calc.name;

results.appendChild(item);

});

results.classList.remove("hidden");

}

/* DESKTOP */

let desktopSearch=document.getElementById("calculatorSearch");

if(desktopSearch){

desktopSearch.addEventListener("input",function(){

searchCalculator(
"calculatorSearch",
"searchResults"
);

});

}

/* MOBILE */

let mobileSearch=document.getElementById("mobileCalculatorSearch");

if(mobileSearch){

mobileSearch.addEventListener("input",function(){

searchCalculator(
"mobileCalculatorSearch",
"mobileSearchResults"
);

});

}

});

</script>
