    // Function that runs the actual search
    function handleSearch(e, resId, listId) {
        const val = e.target.value.toLowerCase().trim();
        const container = document.getElementById(resId);
        const list = document.getElementById(listId);
        if (!container || !list) return;

        list.innerHTML = '';
        if (val.length < 2) { container.classList.add('hidden'); return; }

        const matches = data.filter(c => c.Name.toLowerCase().includes(val)).slice(0, 7);
        if (matches.length > 0) {
            matches.forEach(m => {
                const a = document.createElement('a');
                a.href = m.URL;
                a.className = "block px-4 py-2 hover:bg-blue-50 text-sm text-slate-700 border-b border-slate-50 last:border-0";
                a.textContent = m.Name;
                list.appendChild(a);
            });
            container.classList.remove('hidden');
        } else {
            container.classList.add('hidden');
        }
