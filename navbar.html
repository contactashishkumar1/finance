    function initSearch() {
        const desktopInput = document.getElementById('calcSearch');
        const mobileInput = document.getElementById('calcSearchMobile');
        
        if (!desktopInput && !mobileInput) return;

        function runSearch(input, resId, listId) {
            const container = document.getElementById(resId);
            const list = document.getElementById(listId);
            
            input.addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase().trim();
                list.innerHTML = '';
                if (val.length < 2) { container.classList.add('hidden'); return; }

                const matches = calcIndex.filter(c => c.Name.toLowerCase().includes(val)).slice(0, 6);
                if (matches.length > 0) {
                    matches.forEach(m => {
                        const a = document.createElement('a');
                        a.href = m.URL;
                        a.className = "block px-4 py-2 hover:bg-blue-50 text-sm text-slate-700 border-b border-slate-50 last:border-0";
                        a.textContent = m.Name;
                        list.appendChild(a);
                    });
                    container.classList.remove('hidden');
                } else { container.classList.add('hidden'); }
            });
        }

        if (desktopInput) runSearch(desktopInput, 'searchResults', 'resultsList');
        if (mobileInput) runSearch(mobileInput, 'searchResultsMobile', 'resultsListMobile');

        // Toggle Mobile Menu
        const menuBtn = document.getElementById("menuBtn");
        const mobileMenu = document.getElementById("mobileMenu");
        if (menuBtn) menuBtn.onclick = () => mobileMenu.classList.toggle("hidden");

        // Global click to close search
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#calcSearch') && !e.target.closest('#searchResults')) {
                document.getElementById('searchResults')?.classList.add('hidden');
            }
        });
    }

    // This is the "Magic" part: It watches for the navbar to exist
    const observer = new MutationObserver((mutations, obs) => {
        const target = document.getElementById('calcSearch');
        if (target) {
            initSearch();
            obs.disconnect(); // Stop watching once initialized
        }
    });

    observer.observe(document.body, { childList: true, subtree: true });
    
    // Also try immediate init just in case
    setTimeout(initSearch, 100);
})();
